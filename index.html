<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM Companion | Internal Playbook</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (Script version for vanilla JS usage) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const PERSONAS = [
            { icon: "🎯", role: "SDR", title: "The Pipeline Architect", desc: "Cold outreach is a numbers game — until it isn't. GTM Companion turns every SDR into a researcher, a storyteller, and a qualifier in one. Instant account context, tailored messaging hooks, and BANT signals — before the first call is made. Less spray. More pipeline." },
            { icon: "💼", role: "AE", title: "The Strategic Business Partner", desc: "Your deals don't stall because you lack effort. They stall because you're missing the right insight at the right moment. GTM Companion surfaces the competitive angle, the proof point, the stakeholder map — exactly when you need it. Stop preparing. Start winning." },
            { icon: "📊", role: "Sales Leader", title: "The Franchise Owner", desc: "You can't coach what you can't see. GTM Companion gives leaders real-time deal intelligence, forecast clarity, and rep-level coaching signals — without waiting for the weekly pipeline review. Inspect faster. Coach smarter. Call your number with confidence." },
            { icon: "⚙️", role: "Deal Ops / RevOps", title: "The Engine Room", desc: "Every implicit rule, every unwritten convention, every \"it depends\" answer — GTM Companion makes them explicit, auditable, and consistent. No more tribal knowledge. No more one-off Slack threads. Just clean, governed process at scale." },
            { icon: "🤝", role: "Customer Success", title: "The Retention Driver", desc: "Renewals are won long before the contract comes up. GTM Companion arms CSMs with account health signals, expansion plays, and risk flags — so every customer conversation moves the relationship forward, not just the ticket queue." }
        ];

        // Helper for Lucide icons in a browser-Babel environment
        const Lucide = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const carouselRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab]);

            const scrollCarousel = (direction) => {
                if (carouselRef.current) {
                    const scrollAmount = window.innerWidth > 768 ? 404 : 344;
                    carouselRef.current.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
                }
            };

            const renderDashboard = () => (
                <div className="space-y-16 animate-fade-in max-w-5xl mx-auto py-12">
                    <div className="text-center space-y-8">
                        <div className="space-y-4">
                            <h1 className="text-6xl font-black text-[#022043] tracking-tight">GTM Companion</h1>
                            <p className="text-xl text-slate-500 font-medium tracking-wide">Workday's AI-Powered GTM Assistant</p>
                        </div>
                    </div>

                    <div className="bg-white p-12 md:p-16 rounded-3xl text-center shadow-xl shadow-slate-200/50 relative overflow-hidden mx-auto border border-slate-100">
                        <div className="relative z-10 space-y-8">
                            <h3 className="text-sm font-black text-[#0057AE] uppercase tracking-[0.3em]">Your Unfair Advantage</h3>
                            <p className="text-2xl md:text-3xl font-medium text-[#022043] leading-relaxed max-w-4xl mx-auto">
                                It's not a chatbot. It's your Personal Ai Assistant you can talk to 24/7, who already knows your accounts, your deals, and how Workday actually works.
                            </p>
                        </div>
                        <div className="absolute top-0 right-0 w-72 h-72 bg-sky-100/50 rounded-full blur-[80px] -mr-20 -mt-20 pointer-events-none"></div>
                        <div className="absolute bottom-0 left-0 w-64 h-64 bg-amber-50/50 rounded-full blur-[60px] -ml-20 -mb-20 pointer-events-none"></div>
                    </div>

                    <div className="bg-[#0057AE]/5 border border-[#0057AE]/20 p-8 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-6 shadow-sm">
                        <div className="flex items-center gap-5">
                            <div className="w-14 h-14 bg-[#0057AE] text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                                <Lucide name="shield-alert" size={28} />
                            </div>
                            <div>
                                <h4 className="font-black text-xl text-[#022043]">Request Access</h4>
                                <p className="text-slate-500 text-sm mt-1 font-medium">Get connected to the internal GTM Companion tool.</p>
                            </div>
                        </div>
                        <a href="https://workday.service-now.com/esc?id=sc_cat_item&sys_id=987c3a551bd956500a2786a7624bcb5e&table=sc_cat_item&searchTerm=databricks" target="_blank" className="bg-[#022043] text-white px-8 py-4 rounded-full font-black text-sm hover:scale-105 transition-all flex items-center gap-3 shadow-lg">
                            Open ServiceNow Request <Lucide name="external-link" size={16} />
                        </a>
                    </div>

                    <div className="pt-16 border-t border-slate-200 space-y-16">
                        <div className="max-w-3xl mx-auto text-center space-y-6">
                            <h2 className="text-3xl font-black text-[#022043]">What is GTM Companion?</h2>
                            <p className="text-lg text-slate-600 leading-relaxed">
                                GTM Companion is Workday's internal AI-powered conversational assistant built for Go-To-Market teams including AEs, SDRs, RevOps, and Customer Success. It functions as an <span className="font-bold text-[#022043]">institutional intelligence layer</span> that interprets seller questions and delivers contextually accurate answers without requiring users to re-explain business mechanics.
                            </p>
                        </div>

                        <div className="space-y-6 relative">
                            <div className="flex justify-between items-center px-2">
                                <h2 className="text-2xl font-black text-[#022043]">Core Value Proposition</h2>
                                <div className="flex gap-2">
                                    <button onClick={() => scrollCarousel(-1)} className="p-3 rounded-full bg-white shadow-sm border border-slate-200 hover:bg-slate-50 text-[#022043]">
                                        <Lucide name="chevron-left" />
                                    </button>
                                    <button onClick={() => scrollCarousel(1)} className="p-3 rounded-full bg-white shadow-sm border border-slate-200 hover:bg-slate-50 text-[#022043]">
                                        <Lucide name="chevron-right" />
                                    </button>
                                </div>
                            </div>
                            <div ref={carouselRef} className="flex gap-6 overflow-x-auto pb-8 pt-4 px-2 snap-x snap-mandatory hide-scroll">
                                {PERSONAS.map((persona, idx) => (
                                    <div key={idx} className="min-w-[320px] w-[320px] md:min-w-[380px] md:w-[380px] snap-start bg-white p-8 rounded-3xl border border-slate-100 shadow-md hover:shadow-xl hover:border-blue-200 transition-all flex flex-col gap-4">
                                        <div className="text-4xl mb-2">{persona.icon}</div>
                                        <div>
                                            <h4 className="font-black text-2xl text-[#022043]">{persona.role}</h4>
                                            <h5 className="font-bold text-xs text-[#0057AE] uppercase tracking-widest mt-1">{persona.title}</h5>
                                        </div>
                                        <p className="text-sm text-slate-600 leading-relaxed mt-2 flex-grow">{persona.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-8">
                            <h2 className="text-2xl font-black text-[#022043] text-center">Key Capabilities</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                <CapabilityItem icon="briefcase" title="Daily Sales Ops" text="Forecasting, pipeline management, and opportunity tracking." />
                                <CapabilityItem icon="scale" title="Deal Governance" text="Redirects pricing and non-standard decisions to Deal Ops." />
                                <CapabilityItem icon="check-circle-2" title="Rules Engine" text="Confidence tiers: Verified, Assumed, Needs Confirmation." />
                                <CapabilityItem icon="globe" title="Partner Calibration" text="GSIs, VARs, and ISVs—not all partners are treated equally." />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderRoadmap = () => {
                const PLAYBOOK_SECTIONS = [
                    {
                        title: "PRE-QUARTER PROMPTS",
                        subtitle: "I need to... Use this prompt:",
                        prompts: [
                            { title: "See my full pipeline health", text: "Pull my open pipeline by stage, close date, and last activity. Flag anything with no movement in 30+ days." },
                            { title: "Find my best Q2 targets", text: "Which accounts in my territory are most likely to buy this quarter? Give me the top 5 with reasoning." },
                            { title: "Spot whitespace in my book", text: "Show me the SKU heatmap for [Account]. What are they missing that I should be selling?" },
                            { title: "Re-engage a deal that went dark", text: "Write a re-engagement email to [Name/Title] at [Account]. They went dark after our demo. Lead with a business outcome, not a product pitch." },
                            { title: "Queue outreach before Q2 opens", text: "Build a 3-touch sequence for [Account] targeting the [CFO/CHRO]. We're selling [SKU] and their key pain is [pain]." }
                        ]
                    },
                    {
                        title: "ALWAYS-ON PROMPTS (Use Any Week)",
                        prompts: [
                            { title: "Monday Pipeline Health Check", text: "Review my open pipeline and flag any deals that are stalled, single-threaded, or missing a next step. For each flagged deal, give me one specific action I should take this week to move it forward." },
                            { title: "Friday SFDC Hygiene + Forecast Prep", text: "I have a forecast call tomorrow. My top deals are [LIST DEALS + STAGES]. For each one, tell me: (1) what's the biggest risk to closing on time, (2) what question my manager will likely ask, and (3) my best answer." },
                            { title: "Executive Outreach (Any Week)", text: "I need to reach [PERSONA: CHRO/CFO/CIO] at [ACCOUNT]. They haven't responded to my last two emails. Write me a 3-touch sequence that changes the channel and angle each time. Make it sharp — no fluff." }
                        ]
                    },
                    {
                        title: "Q1 PROMPTS — FEBRUARY / MARCH / APRIL",
                        prompts: [
                            { title: "Account Categorization", text: "Pull the account summary for [ACCOUNT]. Based on what you find, tell me: (1) is this an active opp, expansion target, dormant, or whitespace account? (2) What's the single best entry point or next move right now?" },
                            { title: "Zombie Pipeline Cleanup", text: "I have these deals that have been open for 90+ days with no movement: [LIST DEALS]. For each one, give me a honest assessment — is this worth keeping alive or should I close it out?" },
                            { title: "QBR Prep", text: "I have a QBR with [ACCOUNT] in two weeks. Help me build an agenda that: (1) reviews value delivered, (2) surfaces expansion opportunities, and (3) positions [NEW PRODUCT/SKU] naturally." },
                            { title: "Competitive Deal Strategy", text: "[ACCOUNT] is also evaluating [COMPETITOR] for [PRODUCT]. What's my differentiation strategy, what traps should I set in the evaluation criteria, and what proof points should I bring?" }
                        ]
                    },
                    {
                        title: "Q2 PROMPTS — MAY / JUNE / JULY",
                        prompts: [
                            { title: "Q2 Commit Validation", text: "I'm committing [$ AMOUNT] for Q2. My commit deals are: [LIST DEALS]. Stress-test my commit — what's the biggest risk in each deal, and what's my contingency if one slips?" },
                            { title: "Summer Slowdown Re-engagement", text: "[CONTACT] at [ACCOUNT] has gone quiet. I think they're on vacation. Write me a low-pressure message that keeps the deal alive and gets a response." },
                            { title: "Verbal to Paper Accelerator", text: "[ACCOUNT] gave me a verbal yes. Now I need to get through legal and procurement before July 31. What's the fastest path to paper, and how do I keep momentum without being annoying?" }
                        ]
                    },
                    {
                        title: "Q3 PROMPTS — AUGUST / SEPTEMBER / OCTOBER",
                        prompts: [
                            { title: "Must-Win Deal Strategy", text: "[ACCOUNT] is my most important deal this quarter. Build me a complete deal strategy: stakeholder map, competitive positioning, and the next 3 moves." },
                            { title: "Executive Sponsor Briefing", text: "I'm bringing in our executive sponsor for [ACCOUNT]. The buyer is [TITLE]. How do I brief our exec, and what's the specific ask I should make of them?" },
                            { title: "Deal Review Prep", text: "I have a deal review on [ACCOUNT] tomorrow. The deal is at [STAGE]. What questions will my manager ask, and what are the honest answers I need to be ready with?" }
                        ]
                    },
                    {
                        title: "Q4 PROMPTS — NOVEMBER / DECEMBER / JANUARY",
                        prompts: [
                            { title: "Year-End Urgency Creation", text: "I have [X] deals to close before Jan 31. Help me identify or create a compelling event for [ACCOUNT] that makes signing before year-end logical for them." },
                            { title: "Holiday Freeze Navigation", text: "I need to get [ACCOUNT] into legal before Dec 20. They're moving slowly. What's my escalation play to avoid the holiday freeze?" },
                            { title: "January Re-Engagement", text: "It's Jan 6. Everyone is back. I have deals to close by Jan 31. Write me a re-engagement message for [ACCOUNT] that references where we left off and proposes a meeting this week." }
                        ]
                    },
                    {
                        title: "BONUS: EVERGREEN POWER PROMPTS",
                        prompts: [
                            { title: "Objection Handling", text: "I'm getting this objection from [ACCOUNT]: \"[EXACT OBJECTION].\" How do I handle it using Workday proof points? Give me the empathy, reframe, and pivot." },
                            { title: "Customer Story Pull", text: "I need a customer story for [INDUSTRY] company facing [PAIN POINT]. Find me the best proof point I can use in my next meeting with [ACCOUNT]." },
                            { title: "Deal Health Check", text: "Here's my deal with [ACCOUNT]: [PRODUCT], [STAGE], [CLOSE DATE], [KEY CONTACTS]. Score it against PREDICT and tell me the weakest dimension and what to do about it." }
                        ]
                    }
                ];

                return (
                    <div className="space-y-16 animate-fade-in max-w-5xl mx-auto py-12">
                        <div className="text-center max-w-2xl mx-auto mb-12">
                            <h2 className="text-4xl font-black text-[#022043] mb-4 tracking-tight">Prompt Library</h2>
                            <p className="text-lg text-slate-500">Discover and execute the highest-leverage AI prompts across your revenue cycle and role.</p>
                        </div>

                        <div className="space-y-12">
                            <div className="border-b border-slate-200 pb-6">
                                <h3 className="text-3xl font-black text-[#022043] mb-4">GTM Companion Prompt Playbook — FY27</h3>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-4 text-slate-600 text-sm">
                                    <p><span className="font-black text-[#022043]">Thought Process:</span> Here's your GTM Companion Prompt Playbook. Copy, paste, and swap in your details.</p>
                                    <p><span className="font-black text-[#022043]">How to use:</span> Each prompt maps directly to a cadence week. Swap <span className="font-mono text-xs bg-slate-100 px-1 py-0.5 rounded text-[#0057AE]">[ACCOUNT]</span> with real details; remember to add the @ symbol to tag your account or include your Salesforce opportunity link to the prompt.</p>
                                </div>
                            </div>
                            
                            <div className="space-y-12">
                                {PLAYBOOK_SECTIONS.map((section, idx) => (
                                    <div key={idx} className="space-y-6">
                                        <div className="pb-2 border-b border-slate-100">
                                            <h4 className="text-xl font-bold text-[#022043] flex items-center gap-3">
                                                <Lucide name="calendar" className="text-[#0057AE]" /> {section.title}
                                            </h4>
                                            {section.subtitle && <p className="text-xs font-black text-slate-400 mt-3 ml-8 uppercase tracking-widest">{section.subtitle}</p>}
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {section.prompts.map((p, i) => <PromptCard key={i} title={p.title} prompt={p.text} />)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-8 pt-12">
                            <div className="border-b border-slate-200 pb-4">
                                <h3 className="text-2xl font-black text-[#022043] flex items-center gap-3">
                                    <Lucide name="lightbulb" className="text-amber-500" />
                                    THREE RULES FOR USING COMPANION WELL
                                </h3>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <RuleCard number="1" title="Always name the account." text="The more context you give, the sharper the output." highlight='"Account" + "industry" + "persona"' />
                                <RuleCard number="2" title="Use it before the meeting, not during." text="2 minutes of prep with Companion replaces 45 minutes of Seismic hunting." />
                                <RuleCard number="3" title="If a deal is stuck, there's a prompt for it." text="Don't guess. Ask." />
                            </div>
                        </div>
                    </div>
                );
            };

            const renderPlaybook = () => {
                return (
                    <div className="space-y-16 animate-fade-in max-w-5xl mx-auto py-12">
                        <div className="text-center max-w-3xl mx-auto mb-12">
                            <span className="text-sm font-black text-[#FC5B05] uppercase tracking-widest block mb-4">Quarterly Plays</span>
                            <h2 className="text-4xl md:text-5xl font-black text-[#022043] mb-6 tracking-tight">What Elite AEs Focus on in Q2</h2>
                            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-md text-left space-y-4 mt-8">
                                <h3 className="text-xl font-bold text-[#022043] flex items-center gap-2"><Lucide name="info" className="text-[#0057AE]" /> The Q2 Context First</h3>
                                <p className="text-slate-600">Q1 just closed. Two things are true simultaneously:</p>
                                <ul className="list-none space-y-3 text-slate-600 mt-4">
                                    <li className="flex gap-3 items-start"><div className="w-1.5 h-1.5 rounded-full bg-[#0057AE] mt-2 shrink-0"></div><p><strong className="text-[#022043]">Q2 pipeline is the thinnest it will be all year</strong> — deals that were "almost ready" got pulled into Q1 close, and new pipe hasn't fully replaced them yet</p></li>
                                    <li className="flex gap-3 items-start"><div className="w-1.5 h-1.5 rounded-full bg-[#0057AE] mt-2 shrink-0"></div><p><strong className="text-[#022043]">Q2 is the longest runway quarter</strong> — 13 weeks to build, develop, and close</p></li>
                                </ul>
                                <div className="p-5 bg-blue-50 border-l-4 border-[#0057AE] rounded-r-xl mt-6">
                                    <p className="font-medium text-[#022043]">Elite AEs treat Q2 as <span className="font-black text-[#0057AE]">the quarter that determines whether Q3 and Q4 are easy or desperate.</span></p>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-10">
                            <h3 className="text-3xl font-black text-[#022043] text-center mb-10">The 5 Things the Best AEs Are Doing Right Now</h3>
                            
                            <Q2StrategyCard number="1" title="Pipeline Audit — Ruthless Triage" desc="The best AEs don't carry false hope into Q2. They immediately audit every open opportunity and make hard calls:" bullets={["Advance or kill — anything that didn't move in Q1 gets a 2-week test", "Re-qualify — economic buyers change post-Q1", "Coverage math — calculate exactly how many deals you need at each stage"]} prompts={["Pull my open pipeline — show me everything by stage, close date, and last activity date. Flag anything that hasn't moved in 30+ days.", "For this deal at S3 with no activity in 6 weeks — what are the PREDICT red flags?"]} />
                            
                            <Q2StrategyCard number="2" title="Rebuild Pipeline Aggressively" desc="Q2 is the best time to build for Q3/Q4 because cycles mean what you plant now closes in the fall." bullets={["Expansion plays — every Q1 new logo is an expansion conversation by May", "Whitespace — mine existing customers", "Competitive displacement — target typically 3-year contract cycles"]} prompts={["Show me my existing customers who don't have [Learning / Adaptive Planning / HiredScore] — who's the best expansion target?", "Draft me a 30-day post-close expansion email sequence to start the Adaptive Planning conversation."]} />
                            
                            <Q2StrategyCard number="3" title="Multi-Thread Every Deal" desc="The single biggest reason deals stall is being single-threaded. Build 3-5 relationships per account now." bullets={["Champion ≠ Economic Buyer. Work both simultaneously.", "Map the org chart and schedule introductions now", "Use executive alignment calls to test champions"]} prompts={["I have a deal at [Company Z] — my champion is VP HR but I haven't met CFO. How do I get introduced?", "Draft me a multi-threading email to the CIO at [account] about Extend."]} />
                            
                            <Q2StrategyCard number="4" title="Lock in Mutual Action Plans (JEP)" desc="Any deal at S3+ should have a Joint Engagement Plan in place as a commitment test." bullets={["Set concrete milestones: Security review, legal review, finance sign-off", "Use JEP to pull close dates in, not push them out", "Surface procurement complexity early"]} prompts={["What are typical procurement steps I should map into a JEP for a [segment] company?", "My prospect keeps pushing the JEP conversation. What's the best talk track?"]} />
                            
                            <Q2StrategyCard number="5" title="Sharpen the Business Case" desc="AEs don't walk into EB meetings with demos — they walk in with business cases in the EB's language." bullets={["Quantify the cost of inaction", "Benchmark against similar industry peers", "Anticipate the top 3 objections"]} prompts={["I'm meeting the CFO at [Company B] next week — what's the business case framework I should lead with?", "What customer proof points do we have for [industry] companies that reduced payroll processing time?"]} />
                        </div>

                        <div className="mt-16 bg-white p-8 md:p-12 rounded-3xl text-center shadow-xl border border-slate-100 relative overflow-hidden">
                            <div className="relative z-10">
                                <span className="text-[#FC5B05] font-black uppercase tracking-widest text-sm block mb-6">The Bottom Line</span>
                                <p className="text-2xl md:text-3xl text-black leading-relaxed font-medium max-w-3xl mx-auto">
                                    Elite AEs in Q2 are <span className="text-[#0057AE] font-bold">closing what's closeable, building what's needed for Q3, and expanding what they just landed.</span> Companion accelerates all three.
                                </p>
                            </div>
                            <div className="absolute top-0 right-0 w-64 h-64 bg-sky-100/50 rounded-full blur-[80px] -mr-20 -mt-20 pointer-events-none"></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] text-[#022043]">
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-[#022043] p-2.5 rounded-xl text-white flex items-center justify-center">
                                    <Lucide name="zap" size={24} />
                                </div>
                                <div>
                                    <h1 className="font-black text-xl tracking-tight leading-none text-[#022043]">GTM COMPANION</h1>
                                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">The Revenue Accelerator</span>
                                </div>
                            </div>
                            <div className="hidden md:flex items-center gap-8">
                                <NavLink active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon="layout-dashboard" label="Command Center" />
                                <NavLink active={activeTab === 'roadmap'} onClick={() => setActiveTab('roadmap')} icon="map" label="Prompt Library" />
                                <NavLink active={activeTab === 'playbook'} onClick={() => setActiveTab('playbook')} icon="calendar" label="Quarterly Plays" />
                            </div>
                        </div>
                    </nav>
                    <main className="max-w-7xl mx-auto px-6 py-12">
                        {activeTab === 'dashboard' && renderDashboard()}
                        {activeTab === 'roadmap' && renderRoadmap()}
                        {activeTab === 'playbook' && renderPlaybook()}
                    </main>
                    <footer className="bg-white border-t border-slate-200 mt-12 py-16">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            {activeTab !== 'playbook' && (
                                <div className="mb-12">
                                    <h2 className="text-4xl font-black text-[#022043] mb-4 tracking-tighter">The Leadership Mandate</h2>
                                    <p className="text-slate-500 max-w-xl mx-auto italic mb-12">"The goal isn't adoption; it's behavior change. The tool only accelerates the culture you enforce."</p>
                                </div>
                            )}
                            <div className="flex justify-center">
                                <a href="https://gtm-companion-2832976412840823.aws.databricksapps.com/" target="_blank" className="group inline-flex items-center gap-3 px-10 py-5 bg-[#FC5B05] text-black rounded-full font-black text-lg shadow-xl shadow-[#FC5B05]/20 hover:-translate-y-1 transition-all">
                                    Access GTM Companion <Lucide name="arrow-right" size={20} className="group-hover:translate-x-1 transition-transform" />
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const CapabilityItem = ({ icon, title, text }) => (
            <div className="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-2">
                <Lucide name={icon} className="text-[#0057AE]" />
                <h5 className="font-bold text-[#022043]">{title}</h5>
                <p className="text-xs text-slate-500 leading-relaxed">{text}</p>
            </div>
        );

        const NavLink = ({ active, onClick, icon, label }) => (
            <button onClick={onClick} className={`flex items-center gap-2 text-sm font-bold transition-all ${active ? 'text-[#0057AE]' : 'text-slate-400 hover:text-[#022043]'}`}>
                <Lucide name={icon} size={16} />
                {label}{active && <div className="h-1.5 w-1.5 rounded-full bg-[#0057AE] ml-1" />}
            </button>
        );

        const PromptCard = ({ title, prompt }) => (
            <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow group h-full">
                <div className="flex items-start gap-4 h-full">
                    <div className="p-3 bg-blue-50 rounded-xl text-[#0057AE] mt-1 group-hover:scale-110 transition-transform flex items-center justify-center">
                        <Lucide name="zap" size={20} />
                    </div>
                    <div className="flex flex-col h-full w-full">
                        <h4 className="font-bold text-[#022043] mb-2">{title}</h4>
                        <div className="flex-grow p-3 bg-slate-50 rounded-lg border border-slate-100 text-sm text-slate-600 font-mono group-hover:border-blue-200">"{prompt}"</div>
                    </div>
                </div>
            </div>
        );

        const RuleCard = ({ number, title, text, highlight }) => (
            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group hover:border-blue-200 transition-colors">
                <div className="text-7xl font-black text-slate-50 absolute -top-4 -right-4 pointer-events-none group-hover:text-blue-50/50">{number}</div>
                <h4 className="font-bold text-[#022043] mb-4 relative z-10 text-lg leading-tight">{title}</h4>
                <p className="text-slate-600 text-sm leading-relaxed relative z-10">{text} {highlight && <><br/><br/><span className="font-mono bg-slate-100 px-1.5 py-1 rounded text-xs text-[#0057AE]">{highlight}</span></>}</p>
            </div>
        );

        const Q2StrategyCard = ({ number, title, desc, bullets, prompts }) => (
            <div className="bg-white rounded-3xl border border-slate-200 shadow-md overflow-hidden relative">
                <div className="flex flex-col md:flex-row h-full">
                    <div className="p-8 md:w-1/2 space-y-6 bg-white">
                        <div className="flex items-center gap-4 mb-4">
                            <div className="w-12 h-12 bg-[#022043] text-white rounded-full flex items-center justify-center font-black text-xl shrink-0">{number}</div>
                            <h4 className="text-2xl font-black text-[#022043] leading-tight">{title}</h4>
                        </div>
                        <p className="text-slate-600 leading-relaxed text-sm">{desc}</p>
                        <ul className="space-y-3">
                            {bullets && bullets.map((b, i) => (
                                <li key={i} className="flex gap-3 text-sm text-slate-600 leading-relaxed">
                                    <Lucide name="check-circle-2" size={18} className="text-[#0057AE] shrink-0 mt-0.5" />
                                    <span>{b}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                    <div className="bg-slate-50 p-8 md:w-1/2 border-t md:border-t-0 md:border-l border-slate-200 space-y-4">
                        <h5 className="font-black text-xs uppercase tracking-widest text-slate-400 flex items-center gap-2 mb-4"><Lucide name="zap" size={14} className="text-[#FC5B05]" /> GTM COMPANION PROMPT</h5>
                        <div className="space-y-3">
                            {prompts.map((p, i) => (
                                <div key={i} className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-blue-100 transition-colors group">
                                    <p className="text-sm font-mono text-slate-600">"{p}"</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
